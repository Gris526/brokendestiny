<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Broken Destiny - Character</title>
  <style>
    body {
      background: #111;
      color: #eee;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    header {
      padding: 1rem;
      background: #222;
      text-align: center;
      font-size: 1.5rem;
      font-weight: bold;
    }
    .container {
      display: flex;
      height: calc(100vh - 60px);
    }
    .sidebar {
      width: 250px;
      background: #1a1a1a;
      padding: 1rem;
      overflow-y: auto;
    }
    .main {
      flex: 1;
      padding: 1rem;
      overflow-y: auto;
    }
    img#charImage {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
    }
    input, button, select, textarea {
      margin: 4px 0;
      padding: 5px;
      width: 100%;
      border: none;
      border-radius: 5px;
    }
    button {
      background: #333;
      color: #eee;
      cursor: pointer;
    }
    button:hover {
      background: #444;
    }
    .tabs {
      display: flex;
      margin-bottom: 1rem;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 10px;
      cursor: pointer;
      background: #222;
      border: 1px solid #333;
    }
    .tab.active {
      background: #444;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      margin: 5px 0;
      padding: 5px;
      background: #222;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <header>Broken Destiny - Character</header>
  <div class="container">
    <div class="sidebar">
      <input type="file" id="uploadImage" accept="image/*">
      <img id="charImage" src="" alt="Character Image">
      <input type="text" id="charName" placeholder="Character Name">

      <h3>Stats</h3>
      <div id="stats"></div>
    </div>

    <div class="main">
      <div class="tabs">
        <div class="tab active" data-tab="inventory">Inventory</div>
        <div class="tab" data-tab="spells">Spells</div>
        <div class="tab" data-tab="modifiers">Modifiers</div>
        <div class="tab" data-tab="status">Status</div>
        <div class="tab" data-tab="weapons">Weapons</div>
        <div class="tab" data-tab="armor">Armor</div>
        <div class="tab" data-tab="meta">Meta</div>
      </div>

      <div id="inventory" class="tab-content active">
        <button id="addItem">Add Item</button>
        <ul id="inventoryList"></ul>
      </div>

      <div id="spells" class="tab-content">
        <button id="addSpell">Add Spell</button>
        <ul id="spellList"></ul>
      </div>

      <div id="modifiers" class="tab-content">
        <button id="addModifier">Add Modifier</button>
        <ul id="modifierList"></ul>
      </div>

      <div id="status" class="tab-content">
        <button id="addStatus">Add Status</button>
        <ul id="statusList"></ul>
      </div>

      <div id="weapons" class="tab-content">
        <button id="addWeapon">Add Weapon</button>
        <ul id="weaponList"></ul>
      </div>

      <div id="armor" class="tab-content">
        <button id="addArmor">Add Armor</button>
        <ul id="armorList"></ul>
      </div>

      <div id="meta" class="tab-content">
        <button id="saveData">Export JSON</button>
        <button id="loadData">Import JSON</button>
        <textarea id="dataIO" rows="10" placeholder="Paste JSON here"></textarea>
      </div>
    </div>
  </div>
  <script>
/* =========================
   CHARACTER DATA MODEL
========================= */
let character = {
  name: "",
  image: "",
  stats: {
    Strength: 1,
    Speed: 1,
    Intelligence: 1,
    Resistance: 1,
    Charm: 1,
    Mastery: 1,
    Perception: 1,
    Will: 1,
    Size: 1,
    Luck: 1,
    Stealth: 1,
    Bravery: 1,
    Mana: 1,
    Instinct: 1,
    Aura: 1
  },
  hp: 0,
  mana: 0,
  inventory: [],
  spells: [],
  modifiers: [],
  status: [],
  weapons: [],
  armor: []
};

/* =========================
   UI SETUP
========================= */
const imgInput = document.getElementById("uploadImage");
const charImg = document.getElementById("charImage");
const charNameInput = document.getElementById("charName");
const statsDiv = document.getElementById("stats");

function renderStats() {
  statsDiv.innerHTML = "";
  for (let key in character.stats) {
    const val = character.stats[key];
    let row = document.createElement("div");
    row.innerHTML = `
      <label>${key}: </label>
      <input type="number" min="0" max="99" value="${val}" 
        onchange="updateStat('${key}', this.value)">
    `;
    statsDiv.appendChild(row);
  }
  recalcDerived();
}

function updateStat(stat, value) {
  character.stats[stat] = parseInt(value);
  recalcDerived();
}

function recalcDerived() {
  // HP = 100 per Resistance up to 10, then +10 per extra
  let res = character.stats.Resistance;
  if (res <= 10) character.hp = res * 100;
  else character.hp = 1000 + (res - 10) * 10;

  // Mana pool based on Mana stat
  let manaStat = character.stats.Mana;
  let manaMap = {10: Infinity, 9: 25000, 8: 5000, 7: 2000, 6: 1250, 5: 750, 4: 500, 3: 200, 2: 100, 1: 0};
  character.mana = manaMap[manaStat] || 0;

  statsDiv.querySelectorAll("div").forEach(div => {
    if (div.innerText.includes("Resistance")) div.querySelector("input").style.background = "#222";
  });
}
renderStats();

/* =========================
   IMAGE UPLOAD
========================= */
imgInput.addEventListener("change", e => {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = ev => {
      charImg.src = ev.target.result;
      character.image = ev.target.result;
    };
    reader.readAsDataURL(file);
  }
});

/* =========================
   CHARACTER NAME
========================= */
charNameInput.addEventListener("input", e => {
  character.name = e.target.value;
});

/* =========================
   TAB SWITCHING
========================= */
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById(tab.dataset.tab).classList.add("active");
  });
});

/* =========================
   INVENTORY
========================= */
const inventoryList = document.getElementById("inventoryList");
document.getElementById("addItem").addEventListener("click", () => {
  let item = prompt("Item name?");
  if (item) {
    character.inventory.push(item);
    renderList(inventoryList, character.inventory);
  }
});
function renderList(listEl, arr) {
  listEl.innerHTML = "";
  arr.forEach((item, i) => {
    let li = document.createElement("li");
    li.textContent = item;
    li.addEventListener("click", () => {
      if (confirm("Remove item?")) {
        arr.splice(i,1);
        renderList(listEl, arr);
      }
    });
    listEl.appendChild(li);
  });
}

/* =========================
   SPELLS
========================= */
const spellList = document.getElementById("spellList");
document.getElementById("addSpell").addEventListener("click", () => {
  let spellName = prompt("Spell name?");
  if (spellName) {
    character.spells.push({name: spellName, uses: 0, cooldown: 0});
    renderSpells();
  }
});
function renderSpells() {
  spellList.innerHTML = "";
  character.spells.forEach((s, i) => {
    let level = Math.min(Math.max(Math.floor(Math.pow((s.uses*10/3.98), (1/1.7))),1),100);
    let li = document.createElement("li");
    li.innerHTML = `${s.name} (Level ${level}) 
      <button onclick="castSpell(${i})">Cast</button> 
      <span>Cooldown: ${s.cooldown}</span>`;
    spellList.appendChild(li);
  });
}
function castSpell(i) {
  let spell = character.spells[i];
  if (spell.cooldown > 0) { alert("Spell on cooldown!"); return; }
  spell.uses++;
  spell.cooldown = 3; // Example cooldown
  renderSpells();
}
function nextTurn() {
  character.spells.forEach(s => { if (s.cooldown > 0) s.cooldown--; });
  renderSpells();
}

/* =========================
   MODIFIERS, STATUS, WEAPONS, ARMOR
========================= */
function setupSection(buttonId, listId, array) {
  const listEl = document.getElementById(listId);
  document.getElementById(buttonId).addEventListener("click", () => {
    let val = prompt("Enter name?");
    if (val) {
      array.push(val);
      renderList(listEl, array);
    }
  });
}
setupSection("addModifier","modifierList",character.modifiers);
setupSection("addStatus","statusList",character.status);
setupSection("addWeapon","weaponList",character.weapons);
setupSection("addArmor","armorList",character.armor);

/* =========================
   EXPORT / IMPORT
========================= */
document.getElementById("saveData").addEventListener("click", () => {
  document.getElementById("dataIO").value = JSON.stringify(character, null, 2);
});
document.getElementById("loadData").addEventListener("click", () => {
  try {
    let data = JSON.parse(document.getElementById("dataIO").value);
    character = data;
    charNameInput.value = character.name;
    charImg.src = character.image;
    renderStats();
    renderList(inventoryList, character.inventory);
    renderSpells();
    renderList(document.getElementById("modifierList"), character.modifiers);
    renderList(document.getElementById("statusList"), character.status);
    renderList(document.getElementById("weaponList"), character.weapons);
    renderList(document.getElementById("armorList"), character.armor);
  } catch(e) {
    alert("Invalid JSON");
  }
});
</script>

</body>
</html>
